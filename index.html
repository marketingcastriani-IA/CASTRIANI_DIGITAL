<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Castriani Digital — Estúdio de Sistemas Digitais</title>

  <!-- ═══ Open Graph / WhatsApp ═══ -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="https://marketingcastriani-ia.github.io/CASTRIANI_DIGITAL/" />
  <meta property="og:title"        content="Castriani Digital — Estúdio de Sistemas Digitais" />
  <meta property="og:description"  content="Sistemas e ferramentas digitais para o seu negócio. Acesse agora." />
  <meta property="og:image"        content="https://raw.githubusercontent.com/marketingcastriani-IA/CASTRIANI_DIGITAL/47ab16d1f256a58260edfb7a5f2becf18141a33a/CASTRIANI%20DIGITAL.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"    content="Castriani Digital" />
  <meta property="og:locale"       content="pt_BR" />
  <meta property="og:site_name"    content="Castriani Digital" />

  <!-- ═══ Twitter / Telegram ═══ -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Castriani Digital — Estúdio de Sistemas Digitais" />
  <meta name="twitter:description" content="Sistemas e ferramentas digitais para o seu negócio. Acesse agora." />
  <meta name="twitter:image"       content="https://raw.githubusercontent.com/marketingcastriani-IA/CASTRIANI_DIGITAL/47ab16d1f256a58260edfb7a5f2becf18141a33a/CASTRIANI%20DIGITAL.png" />

  <!-- ═══ SEO ═══ -->
  <meta name="description"  content="Sistemas e ferramentas digitais para o seu negócio. Acesse agora." />
  <meta name="theme-color"  content="#1a1a1a" />
  <meta name="robots"       content="index, follow" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Tela de loading ── */
    #splash {
      position: fixed; inset: 0; z-index: 50;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeUp .6s ease both;
    }
    /* Ícone C laranja — replica a logo do site */
    .logo-c {
      width: 44px; height: 44px;
      background: #e85d04;
      border-radius: 50% 50% 50% 10% / 50% 50% 10% 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 22px; color: #fff;
      font-style: italic;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #e85d04;
      animation: fadeUp .6s .15s ease both;
    }

    /* Barra de progresso */
    .progress-bar {
      width: 200px; height: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 2px;
      overflow: hidden;
      animation: fadeUp .6s .25s ease both;
    }
    .progress-fill {
      height: 100%;
      background: #e85d04;
      border-radius: 2px;
      animation: progress 1.8s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes progress {
      from { width: 0%; }
      60%  { width: 75%; }
      to   { width: 100%; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── iframe (o app em si) ── */
    #app {
      position: fixed; inset: 0; z-index: 10;
      width: 100%; height: 100%;
      border: none;
      /* Esconde scrollbar do iframe no Chrome/Safari */
      overflow: hidden;
    }

    /* ── CSS para tentar ocultar o header/login do Lovable via filter ── */
    /* (funciona apenas se o iframe não for cross-origin bloqueado pelo browser) */
  </style>
</head>
<body>

  <!-- Tela de loading com identidade Castriani -->
  <div id="splash">
    <div class="logo-wrap">
      <div class="logo-c">C</div>
      <span class="logo-text">Castriani Digital</span>
    </div>
    <p class="tagline">[ Estúdio de Sistemas Digitais ]</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- App Lovable em fullscreen -->
  <iframe
    id="app"
    src="https://castrianidgital.lovable.app/"
    title="Castriani Digital"
    allow="fullscreen; clipboard-read; clipboard-write; camera; microphone"
    allowfullscreen
  ></iframe>

  <script>
    const splash = document.getElementById('splash');
    const app    = document.getElementById('app');

    // Esconde o splash quando o iframe carregar
    app.addEventListener('load', () => {
      setTimeout(() => {
        splash.classList.add('hidden');
      }, 400);
    });

    // Fallback: esconde depois de 3s mesmo sem evento load
    setTimeout(() => {
      splash.classList.add('hidden');
    }, 3000);
  </script>

</body>
</html>
