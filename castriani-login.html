<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castriani Digital — Entrar</title>

  <!-- ─── Open Graph / WhatsApp preview ─── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://castrianidgital.lovable.app/" />
  <meta property="og:title"       content="Castriani Digital — Sistemas e ferramentas digitais" />
  <meta property="og:description" content="Acesse agora as ferramentas digitais da Castriani Digital para o seu negócio." />
  <meta property="og:image"       content="https://raw.githubusercontent.com/marketingcastriani-IA/CASTRIANI_DIGITAL/47ab16d1f256a58260edfb7a5f2becf18141a33a/CASTRIANI%20DIGITAL.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"   content="Castriani Digital" />
  <meta property="og:locale"      content="pt_BR" />
  <meta property="og:site_name"   content="Castriani Digital" />

  <!-- Twitter Card (também usado por alguns apps) -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Castriani Digital — Sistemas e ferramentas digitais" />
  <meta name="twitter:description" content="Acesse agora as ferramentas digitais da Castriani Digital para o seu negócio." />
  <meta name="twitter:image"       content="https://raw.githubusercontent.com/marketingcastriani-IA/CASTRIANI_DIGITAL/47ab16d1f256a58260edfb7a5f2becf18141a33a/CASTRIANI%20DIGITAL.png" />

  <!-- SEO básico -->
  <meta name="description" content="Acesse agora as ferramentas digitais da Castriani Digital para o seu negócio." />
  <meta name="theme-color" content="#7b5cff" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #e8ff47;
      --accent2: #7b5cff;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --error: #ff5c5c;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ─── animated background ─── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(123,92,255,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123,92,255,.07) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    .blob {
      position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none;
    }
    .blob-1 { width: 480px; height: 480px; background: rgba(123,92,255,.18); top: -120px; left: -120px; animation: float1 12s ease-in-out infinite; }
    .blob-2 { width: 360px; height: 360px; background: rgba(232,255,71,.10); bottom: -80px; right: -80px; animation: float2 15s ease-in-out infinite; }
    .blob-3 { width: 260px; height: 260px; background: rgba(123,92,255,.12); top: 50%; left: 60%; animation: float3 18s ease-in-out infinite; }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }

    /* ─── layout ─── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      box-shadow: 0 0 0 1px rgba(123,92,255,.08), 0 32px 80px rgba(0,0,0,.6);
      animation: cardIn .6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* ─── logo / brand ─── */
    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -.4px;
    }
    .brand-name span { color: var(--accent); }

    /* ─── heading ─── */
    .heading { margin-bottom: 28px; }
    .heading h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -.6px;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .heading p { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* ─── form ─── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      opacity: .35; pointer-events: none;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent2);
      background: rgba(123,92,255,.06);
      box-shadow: 0 0 0 3px rgba(123,92,255,.15);
    }
    input::placeholder { color: var(--muted); }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; line-height: 0;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text); }

    .row-forgot {
      display: flex; justify-content: flex-end;
      margin-top: -6px; margin-bottom: 20px;
    }
    .link-subtle {
      font-size: 13px; color: var(--muted); text-decoration: none;
      transition: color .2s;
    }
    .link-subtle:hover { color: var(--accent); }

    /* ─── error message ─── */
    .error-msg {
      display: none;
      background: rgba(255,92,92,.08);
      border: 1px solid rgba(255,92,92,.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
    }
    .error-msg.show { display: flex; align-items: center; gap: 8px; }

    /* ─── button ─── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 15px;
      letter-spacing: .02em;
      cursor: pointer;
      transition: filter .2s, transform .1s;
      position: relative; overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent2) 0%, #a478ff 100%);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-primary:active { transform: scale(.98); }

    .btn-primary .btn-text { transition: opacity .2s; }
    .btn-primary .btn-loading {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary.loading .btn-text { opacity: 0; }
    .btn-primary.loading .btn-loading { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── divider ─── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ─── footer ─── */
    .card-footer {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted);
    }
    .card-footer a {
      color: var(--accent); text-decoration: none; font-weight: 500;
      transition: opacity .2s;
    }
    .card-footer a:hover { opacity: .75; }

    /* ─── iframe overlay (shown after login) ─── */
    #app-frame {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      width: 100%; height: 100%;
      border: none;
      background: var(--bg);
    }

    /* ─── success flash ─── */
    .success-flash {
      display: none;
      position: fixed; inset: 0; z-index: 99;
      background: var(--bg);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .success-flash.show { display: flex; animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .success-flash .check {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      animation: popIn .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
    .success-flash p {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 20px;
    }

    /* ─── footer badge ─── */
    .powered {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-size: 11px; color: rgba(255,255,255,.18);
      letter-spacing: .04em;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ─── Login card ─── -->
<div class="page" id="login-page">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div class="brand-name">Castriani<span>Digital</span></div>
    </div>

    <div class="heading">
      <h1>Bem-vindo de volta</h1>
      <p>Acesse sua conta para continuar usando as ferramentas digitais.</p>
    </div>

    <div class="error-msg" id="error-msg">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text">E-mail ou senha incorretos.</span>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" id="toggle-pw" type="button" title="Mostrar senha">
          <svg id="eye-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div class="row-forgot">
      <a href="#" class="link-subtle" id="forgot-link">Esqueceu a senha?</a>
    </div>

    <button class="btn btn-primary" id="login-btn" type="button">
      <span class="btn-text">Entrar</span>
      <span class="btn-loading">
        <span class="spinner"></span>
        <span>Verificando…</span>
      </span>
    </button>

    <div class="divider">ou</div>

    <div class="card-footer">
      Não tem uma conta? <a href="mailto:contato@castrianidgital.com">Fale conosco</a>
    </div>

  </div>
</div>

<!-- ─── Success flash ─── -->
<div class="success-flash" id="success-flash">
  <div class="check">✓</div>
  <p>Acesso liberado!</p>
</div>

<!-- ─── App iframe (Lovable hidden behind login) ─── -->
<iframe id="app-frame" src="" title="Castriani Digital App" allow="fullscreen"></iframe>

<p class="powered">© Castriani Digital</p>

<script>
  // ─── Credentials ─────────────────────────────────────────────────
  // Adicione quantos usuários quiser neste array:
  const USERS = [
    { email: "admin@castrianidgital.com", password: "Castriani@2025" },
    { email: "usuario@castrianidgital.com", password: "Acesso@123" }
    // { email: "outro@email.com", password: "outrasenha" }
  ];

  const APP_URL = "https://castrianidgital.lovable.app/";
  // ─────────────────────────────────────────────────────────────────

  const loginBtn  = document.getElementById("login-btn");
  const emailIn   = document.getElementById("email");
  const passIn    = document.getElementById("password");
  const errorMsg  = document.getElementById("error-msg");
  const errorText = document.getElementById("error-text");
  const togglePw  = document.getElementById("toggle-pw");
  const frame     = document.getElementById("app-frame");
  const flash     = document.getElementById("success-flash");
  const loginPage = document.getElementById("login-page");

  // Toggle password visibility
  togglePw.addEventListener("click", () => {
    const show = passIn.type === "password";
    passIn.type = show ? "text" : "password";
    togglePw.querySelector("svg").style.opacity = show ? "1" : ".35";
  });

  // Forgot password
  document.getElementById("forgot-link").addEventListener("click", (e) => {
    e.preventDefault();
    showError("Entre em contato: contato@castrianidgital.com");
  });

  // Login logic
  loginBtn.addEventListener("click", handleLogin);
  [emailIn, passIn].forEach(el => el.addEventListener("keydown", e => {
    if (e.key === "Enter") handleLogin();
    hideError();
  }));

  function handleLogin() {
    const email = emailIn.value.trim().toLowerCase();
    const pass  = passIn.value;

    if (!email || !pass) {
      showError("Preencha e-mail e senha.");
      return;
    }

    // loading state
    loginBtn.classList.add("loading");
    loginBtn.disabled = true;
    hideError();

    setTimeout(() => {
      const valid = USERS.some(
        u => u.email.toLowerCase() === email && u.password === pass
      );

      if (valid) {
        // Show success flash, then open app in iframe
        flash.classList.add("show");
        setTimeout(() => {
          flash.classList.remove("show");
          loginPage.style.display = "none";
          frame.src = APP_URL;
          frame.style.display = "block";
        }, 1200);
      } else {
        loginBtn.classList.remove("loading");
        loginBtn.disabled = false;
        showError("E-mail ou senha incorretos. Tente novamente.");
        passIn.value = "";
        passIn.focus();
      }
    }, 900);
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.add("show");
  }
  function hideError() {
    errorMsg.classList.remove("show");
  }
</script>
</body>
</html>
